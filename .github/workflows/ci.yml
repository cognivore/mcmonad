name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  test-haskell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - name: Build and test Haskell (QuickCheck)
        run: nix build .#mcmonad

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            extra-platforms = aarch64-darwin
            allowed-impure-host-deps = /System/Library /bin/sh /dev /usr/lib /usr/bin /Applications/Xcode.app /Library/Developer/CommandLineTools
      - name: Build .app bundle
        run: nix build .#mcmonad-app
      - name: Verify .app bundle
        run: |
          APP="result/Applications/MCMonad.app/Contents"
          echo "=== Binaries ==="
          ls -la "$APP/MacOS/"
          echo "=== Frameworks ==="
          ls -la "$APP/Frameworks/"
          echo "=== Checking for nix store refs ==="
          if otool -L "$APP/MacOS/mcmonad" | grep /nix/store; then
            echo "FAIL: mcmonad still has nix store references"
            exit 1
          fi
          echo "All clear"
      - name: Package dev release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cp -r result/Applications/MCMonad.app .
          zip -r MCMonad-dev-arm64.zip MCMonad.app
      - name: Update dev release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build
          prerelease: true
          files: MCMonad-dev-arm64.zip
          body: |
            Latest build from `main` (updated on every push).

            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            ### Install
            1. Download and unzip `MCMonad-dev-arm64.zip`
            2. Move `MCMonad.app` to `/Applications/`
            3. Double-click to launch — it will install itself as a login item
            4. Grant Accessibility permission when prompted
            5. To bypass Gatekeeper: `xattr -cr /Applications/MCMonad.app`
