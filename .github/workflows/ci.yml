name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-haskell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - name: Build and test Haskell (QuickCheck)
        run: nix build .#mcmonad-tested

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            extra-platforms = aarch64-darwin
            allowed-impure-host-deps = /System/Library /bin/sh /dev /usr/lib /usr/bin /Applications/Xcode.app /Library/Developer/CommandLineTools
      - name: Build .app bundle
        run: nix build .#mcmonad-app
      - name: Verify .app bundle
        run: |
          APP="result/Applications/MCMonad.app/Contents"
          echo "=== Binaries ==="
          ls -la "$APP/MacOS/"
          echo "=== Frameworks ==="
          ls -la "$APP/Frameworks/"
          echo "=== Checking for nix store refs ==="
          if otool -L "$APP/MacOS/mcmonad" | grep /nix/store; then
            echo "FAIL: mcmonad still has nix store references"
            exit 1
          fi
          echo "All clear"
